<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texas Hold'em - Multiplayer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
            overflow: hidden;
        }

        #table-cont {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #table {
            width: 95%;
            max-width: 1100px;
            height: 90%;
            background: radial-gradient(circle at center, #0f7a37 0%, #084c20 100%);
            border: 15px solid #b8860b;
            border-radius: 200px;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.8), 0 20px 50px rgba(0, 0, 0, 0.9);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            border-style: groove;
        }

        @media (max-width: 768px) {
            #table {
                border-radius: 50px;
                border-width: 8px;
                height: 98%;
                width: 98%;
            }
            .card { width: 45px; height: 65px; font-size: 20px; border-radius: 4px; }
            .pos-left { left: 5px; }
            .pos-right { right: 5px; }
            .chip-box { font-size: 12px; padding: 4px 8px; }
            #controls { max-width: 250px; }
        }
        @media (max-height: 750px) {
            .card { width: 50px; height: 75px; font-size: 22px; }
            #community { margin-top: -20px; }
            .pos-0 { bottom: 5px; }
            .pos-top { top: 5px; }
            .chip-box { font-size: 13px; padding: 4px 8px; }
        }

        .player-container {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 2;
        }

        /* Positions */
        .pos-0 { bottom: 15px; left: 50%; transform: translateX(-50%); }
        .pos-top { top: 15px; left: 50%; transform: translateX(-50%); }
        .pos-left { left: 30px; top: 50%; transform: translateY(-50%); }
        .pos-right { right: 30px; top: 50%; transform: translateY(-50%); }

        .cards-container {
            display: flex;
            gap: 6px;
            min-height: 100px;
            align-items: center;
        }
        
        .pos-left .cards-container, .pos-right .cards-container {
            gap: 2px;
        }

        .card {
            width: 70px;
            height: 100px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 34px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.6);
            position: relative;
            border: 1px solid #fff;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            animation: deal 0.4s ease-out;
            color: #111;
        }

        .card.red {
            color: #d32f2f;
        }

        .card.hidden {
            background: repeating-linear-gradient(45deg, #661111, #661111 8px, #881111 8px, #881111 16px);
            border: 2px solid #ddd;
            color: transparent;
        }
        
        .card.hidden * {
            display: none;
        }

        .card .top-left {
            position: absolute;
            top: 4px;
            left: 6px;
            font-size: 14px;
            line-height: 1;
            font-weight: bold;
            text-align: center;
        }

        .card .bottom-right {
            position: absolute;
            bottom: 4px;
            right: 6px;
            font-size: 14px;
            line-height: 1;
            transform: rotate(180deg);
            font-weight: bold;
            text-align: center;
        }

        @keyframes deal {
            from { transform: translateY(-30px) scale(0.8); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .chip-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 15px;
            border-radius: 20px;
            border: 2px solid #b8860b;
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.6);
            white-space: nowrap;
        }

        .rank-name {
            font-size: 14px;
            color: #aeea00;
            font-weight: bold;
            min-height: 20px;
            text-shadow: 1px 1px 2px #000;
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 10px;
            border-radius: 10px;
        }

        .folded-tag {
            background: rgba(255, 0, 0, 0.8) !important;
            color: white !important;
            border-color: #800 !important;
        }
        
        .active-turn .chip-box {
            box-shadow: 0 0 20px 5px #ffd700;
            border-color: #fff !important;
            transform: scale(1.1);
            transition: all 0.3s;
        }

        #community {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 1;
            margin-top: -50px;
        }

        .community-cards {
            display: flex;
            gap: 10px;
            min-height: 100px;
        }

        #pot-info {
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 30px;
            border-radius: 12px;
            border: 2px solid #b8860b;
            color: #ffd700;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.7);
            min-width: 150px;
            text-align: center;
        }

        #status-msg {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 3px #000;
            min-height: 30px;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 20px;
            border-radius: 20px;
        }

        #controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            min-height: 45px;
            margin-top: 5px;
            max-width: 300px;
            margin-bottom: 5px;
        }

        .action-btn {
            background: linear-gradient(145deg, #ffd700, #b8860b);
            color: #000;
            border: 2px solid #5a4200;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s, filter 0.2s;
            text-transform: uppercase;
        }

        .action-btn:active { transform: scale(0.95); }
        .action-btn:hover { filter: brightness(1.2); }
        .action-btn:disabled { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; transform: none; }

        #modal, #setup-modal {
            display: flex;
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center; align-items: center;
            z-index: 100; flex-direction: column;
        }

        .modal-content {
            background: radial-gradient(circle, #2a2a2a 0%, #111 100%);
            padding: 40px 60px;
            border-radius: 15px;
            border: 3px solid #b8860b;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.4);
        }

        .modal-content h2 { margin-top: 0; color: #ffd700; font-size: 36px; text-shadow: 2px 2px 4px #000; margin-bottom: 30px; }
        
        .setup-btns { display: flex; gap: 20px; justify-content: center; }
        .setup-btns button { padding: 15px 30px; font-size: 24px; }
        
        #modal { display: none; }
    </style>
</head>

<body>

    <div id="setup-modal">
        <div class="modal-content">
            <h2>Select Players</h2>
            <div class="setup-btns">
                <button class="action-btn" onclick="startGame(2)">2 Players</button>
                <button class="action-btn" onclick="startGame(3)">3 Players</button>
                <button class="action-btn" onclick="startGame(4)">4 Players</button>
            </div>
        </div>
    </div>

    <div id="table-cont" style="display:none;">
        <div id="table">
            <div id="community">
                <div id="pot-info">Pot: $<span id="pot">0</span></div>
                <div class="community-cards" id="community-cards"></div>
                <div id="status-msg">Welcome to Texas Hold'em</div>
            </div>
            <div id="players-layer"></div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 id="modal-title">Round Over</h2>
            <button class="action-btn" id="next-hand-btn" onclick="initRound()" style="font-size: 20px; padding: 15px 40px;">Next Hand</button>
        </div>
    </div>

    <script>
        const SUITS = ['♠', '♥', '♦', '♣'];
        
        let state = {
            deck: [], community: [], players: [],
            pot: 0, roundBet: 0, phase: 'INIT', turnIndex: 0, 
            log: "", gameOver: false, playerCount: 2
        };

        function setLog(msg) {
            state.log = msg;
            document.getElementById('status-msg').innerText = msg;
        }

        function updateRaiseLabel(val, maxVal) {
            let btn = document.getElementById('raise-btn');
            if (btn) {
                if (parseInt(val) >= maxVal) {
                    btn.innerText = "All-In ($" + val + ")";
                } else {
                    let prefix = state.roundBet > 0 ? "Raise" : "Bet";
                    btn.innerText = prefix + " $" + val;
                }
            }
        }

        function getDeck() {
            let deck = [];
            for (let suit of SUITS) {
                for (let rank = 2; rank <= 14; rank++) deck.push({ suit, rank });
            }
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck;
        }

        function getRankString(rank) {
            if (rank === 14) return 'A';
            if (rank === 13) return 'K';
            if (rank === 12) return 'Q';
            if (rank === 11) return 'J';
            return rank.toString();
        }

        function renderCard(card, hidden = false) {
            if (hidden) return `<div class="card hidden"></div>`;
            let colorClass = (card.suit === '♥' || card.suit === '◆') ? 'red' : 'black';
            let str = getRankString(card.rank);
            return `<div class="card ${colorClass}">
            <div class="top-left">${str}<br>${card.suit}</div>
            <i>${card.suit}</i>
            <div class="bottom-right">${str}<br>${card.suit}</div>
        </div>`;
        }

        function evaluateHand(cards) {
            if (!cards || cards.length < 5) return { value: -1, name: "", kickers: [] };
            let ranks = cards.map(c => c.rank).sort((a, b) => b - a);
            let counts = {};
            for (let r of ranks) counts[r] = (counts[r] || 0) + 1;
            let countsArr = Object.entries(counts).map(([r, c]) => ({ rank: parseInt(r), count: c }))
                .sort((a, b) => b.count - a.count || b.rank - a.rank);

            let suitCounts = {};
            for (let c of cards) suitCounts[c.suit] = (suitCounts[c.suit] || 0) + 1;
            let flushSuit = Object.keys(suitCounts).find(s => suitCounts[s] >= 5);
            let isFlush = !!flushSuit;
            let flushRanks = isFlush ? cards.filter(c => c.suit === flushSuit).map(c => c.rank).sort((a, b) => b - a) : [];

            function findStraight(rankList) {
                let un = [...new Set(rankList)].sort((a, b) => b - a);
                if (un.includes(14)) un.push(1);
                for (let i = 0; i <= un.length - 5; i++) {
                    if (un[i] - un[i + 4] === 4) return un.slice(i, i + 5);
                }
                return null;
            }

            let straightRanks = findStraight(ranks);
            let straightFlushRanks = isFlush ? findStraight(flushRanks) : null;

            if (straightFlushRanks) {
                if (straightFlushRanks[0] === 14) return { value: 9, name: "Royal Flush", kickers: straightFlushRanks };
                return { value: 8, name: "Straight Flush", kickers: straightFlushRanks };
            }
            if (countsArr[0] && countsArr[0].count === 4) return { value: 7, name: "Four of a Kind", kickers: [countsArr[0].rank, ...ranks.filter(r => r !== countsArr[0].rank).slice(0, 1)] };
            if (countsArr[0] && countsArr[0].count === 3 && countsArr[1] && countsArr[1].count >= 2) return { value: 6, name: "Full House", kickers: [countsArr[0].rank, countsArr[1].rank] };
            if (isFlush) return { value: 5, name: "Flush", kickers: flushRanks.slice(0, 5) };
            if (straightRanks) return { value: 4, name: "Straight", kickers: straightRanks };
            if (countsArr[0] && countsArr[0].count === 3) return { value: 3, name: "Three of a Kind", kickers: [countsArr[0].rank, ...ranks.filter(r => r !== countsArr[0].rank).slice(0, 2)] };
            if (countsArr[0] && countsArr[0].count === 2 && countsArr[1] && countsArr[1].count === 2) return { value: 2, name: "Two Pair", kickers: [countsArr[0].rank, countsArr[1].rank, ...ranks.filter(r => r !== countsArr[0].rank && r !== countsArr[1].rank).slice(0, 1)] };
            if (countsArr[0] && countsArr[0].count === 2) return { value: 1, name: "One Pair", kickers: [countsArr[0].rank, ...ranks.filter(r => r !== countsArr[0].rank).slice(0, 3)] };

            return { value: 0, name: "High Card", kickers: ranks.slice(0, 5) };
        }

        function compareHands(h1, h2) {
            if (h1.value > h2.value) return 1;
            if (h1.value < h2.value) return -1;
            for (let i = 0; i < h1.kickers.length; i++) {
                if (h1.kickers[i] > h2.kickers[i]) return 1;
                if (h1.kickers[i] < h2.kickers[i]) return -1;
            }
            return 0;
        }

        function startGame(count) {
            state.playerCount = count;
            document.getElementById('setup-modal').style.display = 'none';
            document.getElementById('table-cont').style.display = 'flex';
            
            state.players = [];
            let positions = [];
            if (count === 2) positions = ['pos-0', 'pos-top'];
            else if (count === 3) positions = ['pos-0', 'pos-left', 'pos-right'];
            else if (count === 4) positions = ['pos-0', 'pos-left', 'pos-top', 'pos-right'];

            for (let i = 0; i < count; i++) {
                state.players.push({
                    id: i,
                    name: i === 0 ? "You" : "AI " + i,
                    isUser: i === 0,
                    posClass: positions[i],
                    chips: 1000,
                    cards: [],
                    currentBet: 0,
                    folded: false,
                    eliminated: false,
                    hasActed: false
                });
            }
            buildUI();
            initRound();
        }

        function buildUI() {
            let html = '';
            for (let p of state.players) {
                html += `
                    <div class="player-container ${p.posClass}" id="player-box-${p.id}">
                        ${p.isUser ? '<div id="controls"></div>' : ''}
                        <div class="rank-name" id="rank-${p.id}"></div>
                        <div class="cards-container" id="cards-${p.id}"></div>
                        <div class="chip-box" id="chips-${p.id}">${p.name}: $${p.chips}</div>
                    </div>
                `;
            }
            document.getElementById('players-layer').innerHTML = html;
        }

        function initRound() {
            if (state.gameOver) {
                state.players.forEach(p => { p.chips = 1000; p.eliminated = false; });
                state.gameOver = false;
            }
            document.getElementById('modal').style.display = 'none';

            let activeCount = 0;
            state.players.forEach(p => {
                if (p.chips <= 0) p.eliminated = true;
                if (!p.eliminated) activeCount++;
            });
            
            if (activeCount <= 1) {
                let winner = state.players.find(p => !p.eliminated);
                document.getElementById('modal-title').innerText = winner.isUser ? "You Won the Tournament!" : winner.name + " Won!";
                document.getElementById('next-hand-btn').innerText = "New Game";
                state.gameOver = true;
                document.getElementById('modal').style.display = 'flex';
                return;
            }

            state.deck = getDeck();
            state.community = [];
            state.pot = 0;
            state.roundBet = 0;
            let ante = 20;

            state.players.forEach(p => {
                p.cards = [];
                p.folded = false;
                p.currentBet = 0;
                p.hasActed = false;
                if (!p.eliminated) {
                    p.cards = [state.deck.pop(), state.deck.pop()];
                    let pAnte = Math.min(ante, p.chips);
                    p.chips -= pAnte;
                    state.pot += pAnte;
                }
            });

            state.phase = 'PRE-FLOP';
            state.turnIndex = -1;
            setLog("Ante Paid. Dealing...");
            updateUI();
            
            setTimeout(() => {
                evaluateTurnState();
            }, 800);
        }

        function advancePhase() {
            state.players.forEach(p => { p.currentBet = 0; p.hasActed = false; });
            state.roundBet = 0;

            if (state.phase === 'PRE-FLOP') {
                state.phase = 'FLOP';
                state.community.push(state.deck.pop(), state.deck.pop(), state.deck.pop());
                setLog("Flop Dealt.");
            } else if (state.phase === 'FLOP') {
                state.phase = 'TURN';
                state.community.push(state.deck.pop());
                setLog("Turn Dealt.");
            } else if (state.phase === 'TURN') {
                state.phase = 'RIVER';
                state.community.push(state.deck.pop());
                setLog("River Dealt.");
            } else if (state.phase === 'RIVER') {
                state.phase = 'SHOWDOWN';
                handleShowdown();
                return;
            }
            
            updateUI();
            setTimeout(() => {
                state.turnIndex = -1; // reset turn to first active player
                evaluateTurnState();
            }, 800);
        }

        function distributePot(winnersArray) {
            if (winnersArray.length === 1) {
                winnersArray[0].chips += state.pot;
                setLog(`${winnersArray[0].name} wins $${state.pot}!`);
            } else {
                let chunk = Math.floor(state.pot / winnersArray.length);
                winnersArray.forEach(w => w.chips += chunk);
                setLog("Tie! Pot Split.");
            }
            state.pot = 0;
            updateUI();

            setTimeout(() => {
                document.getElementById('modal-title').innerText = "Round Result: " + state.log;
                document.getElementById('modal').style.display = 'flex';
            }, 2500);
        }

        function handleShowdown() {
            let active = state.players.filter(p => !p.folded && !p.eliminated);
            if (active.length === 0) return;
            
            let bestHands = [];

            active.forEach(p => {
                let hand = evaluateHand([...p.cards, ...state.community]);
                p.handObj = hand;
            });

            active.sort((a, b) => compareHands(b.handObj, a.handObj));
            
            bestHands.push(active[0]);
            for (let i = 1; i < active.length; i++) {
                if (compareHands(active[0].handObj, active[i].handObj) === 0) {
                    bestHands.push(active[i]);
                }
            }

            setLog("Showdown!");
            distributePot(bestHands);
        }

        function evaluateTurnState() {
            let active = state.players.filter(p => !p.folded && !p.eliminated);
            
            if (active.length === 1) {
                state.phase = 'SHOWDOWN';
                setLog(`${active[0].name} takes the pot!`);
                updateUI();
                setTimeout(() => distributePot(active), 1500);
                return;
            }

            let notAllIn = active.filter(p => p.chips > 0);
            let playersNeedingToAct = notAllIn.filter(p => p.currentBet < state.roundBet || !p.hasActed);

            if (playersNeedingToAct.length === 0) {
                if (notAllIn.length <= 1 && active.length > 1) {
                    // Everyone else is all-in or folded, just deal remaining cards
                    if (state.phase !== 'SHOWDOWN') {
                        setTimeout(() => fastForwardShowdown(), 1000);
                    }
                    return;
                }
                advancePhase();
                return;
            }
            advanceTurn();
        }
        
        function fastForwardShowdown() {
            if(state.phase === 'PRE-FLOP') state.community.push(state.deck.pop(), state.deck.pop(), state.deck.pop());
            if(state.phase === 'PRE-FLOP' || state.phase === 'FLOP') state.community.push(state.deck.pop());
            if(state.phase !== 'RIVER' && state.phase !== 'SHOWDOWN') state.community.push(state.deck.pop());
            state.phase = 'SHOWDOWN';
            updateUI();
            setTimeout(handleShowdown, 1500);
        }

        function advanceTurn() {
            let emergencyCounter = 0;
            do {
                state.turnIndex = (state.turnIndex + 1) % state.players.length;
                emergencyCounter++;
                if (emergencyCounter > state.players.length * 2) {
                    // safety break to prevent infinite loops just in case
                    return; 
                }
            } while (state.players[state.turnIndex].folded || state.players[state.turnIndex].eliminated || state.players[state.turnIndex].chips === 0);

            let p = state.players[state.turnIndex];
            setLog(`${p.name}'s Turn`);
            updateUI();

            if (!p.isUser) {
                setTimeout(aiLogic, 1200 + Math.random() * 800);
            }
        }

        function tryBet(p, amount) {
            let actual = Math.min(amount, p.chips);
            p.chips -= actual;
            p.currentBet += actual;
            state.pot += actual;
            if (p.currentBet > state.roundBet) {
                state.roundBet = p.currentBet;
                // others need to act again
                state.players.forEach(x => { if (x.id !== p.id && !x.folded && !x.eliminated) x.hasActed = false; });
            }
            return actual;
        }

        function processAction(action, raiseAmt = 50) {
            let p = state.players[state.turnIndex];
            if (!p) return;
            p.hasActed = true;

            if (action === 'FOLD') {
                p.folded = true;
                setLog(`${p.name} Folded.`);
            } else if (action === 'CHECK') {
                setLog(`${p.name} Checked.`);
            } else if (action === 'CALL') {
                let toCall = state.roundBet - p.currentBet;
                tryBet(p, toCall);
                setLog(`${p.name} Called.`);
            } else if (action === 'BET') {
                let toCall = state.roundBet - p.currentBet;
                tryBet(p, toCall + raiseAmt);
                setLog(`${p.name} Raised.`);
            }
            updateUI();
            setTimeout(evaluateTurnState, 800);
        }

        function playerAction(action, raiseAmt = 50) {
            if (state.phase === 'SHOWDOWN' || !state.players[state.turnIndex] || !state.players[state.turnIndex].isUser) return;
            processAction(action, raiseAmt);
        }

        function aiLogic() {
            if (state.phase === 'SHOWDOWN') return;
            let p = state.players[state.turnIndex];
            if (!p || p.isUser) return;

            let toCall = state.roundBet - p.currentBet;
            
            if (toCall > 0) {
                if (Math.random() > 0.4 || p.chips < 20) {
                    processAction('CALL');
                } else if (Math.random() > 0.8 && p.chips > toCall) {
                    let maxRaise = p.chips - toCall;
                    let aiRaise = Math.max(50, Math.floor(Math.random() * Math.min(200, maxRaise)));
                    aiRaise = Math.min(aiRaise, maxRaise);
                    processAction('BET', aiRaise);
                } else {
                    processAction('FOLD');
                }
            } else {
                if (Math.random() > 0.3 || p.chips === 0) {
                    processAction('CHECK');
                } else {
                    let maxRaise = p.chips;
                    let aiRaise = Math.max(50, Math.floor(Math.random() * Math.min(200, maxRaise)));
                    aiRaise = Math.min(aiRaise, maxRaise);
                    processAction('BET', aiRaise);
                }
            }
        }

        function updateUI() {
            document.getElementById('pot').innerText = state.pot;
            document.getElementById('community-cards').innerHTML = state.community.map(c => renderCard(c)).join('');

            let showAll = state.phase === 'SHOWDOWN';

            state.players.forEach(p => {
                let pBox = document.getElementById(`player-box-${p.id}`);
                if (!pBox) return;

                if (p.eliminated) {
                    pBox.style.display = 'none';
                    return;
                }

                if (state.turnIndex === p.id && state.phase !== 'SHOWDOWN') {
                    pBox.classList.add('active-turn');
                } else {
                    pBox.classList.remove('active-turn');
                }

                let chipsEl = document.getElementById(`chips-${p.id}`);
                chipsEl.innerText = `${p.name}: $${p.chips}`;
                
                if (p.folded) {
                    chipsEl.classList.add('folded-tag');
                    chipsEl.innerText = `${p.name}: FOLDED`;
                    document.getElementById(`cards-${p.id}`).innerHTML = '';
                    document.getElementById(`rank-${p.id}`).innerText = '';
                } else {
                    chipsEl.classList.remove('folded-tag');
                    let hideCards = !p.isUser && !showAll;
                    document.getElementById(`cards-${p.id}`).innerHTML = p.cards.map(c => renderCard(c, hideCards)).join('');
                    
                    if (p.cards.length > 0 && (!hideCards || p.isUser)) {
                        let hand = evaluateHand([...p.cards, ...state.community]);
                        document.getElementById(`rank-${p.id}`).innerText = hand.name;
                    } else {
                        document.getElementById(`rank-${p.id}`).innerText = '';
                    }
                }

                if (p.isUser) {
                    let controlsEl = document.getElementById('controls');
                    if (controlsEl) {
                        if (state.turnIndex === p.id && state.phase !== 'SHOWDOWN') {
                            let toCall = state.roundBet - p.currentBet;
                            let html = '';
                            if (toCall > 0) {
                                let label = (p.chips <= toCall) ? 'All-In' : `Call ($${toCall})`;
                                html += `<button class="action-btn" onclick="playerAction('CALL')">${label}</button>`;
                                html += `<button class="action-btn" onclick="playerAction('FOLD')">Fold</button>`;
                                if (p.chips > toCall) {
                                    let maxRaise = p.chips - toCall;
                                    let minRaise = Math.min(50, maxRaise);
                                    let initRaise = minRaise;
                                    html += `<button class="action-btn" id="raise-btn" onclick="playerAction('BET', parseInt(document.getElementById('raise-slider').value))">Raise $${initRaise}</button>`;
                                    html += `<input type="range" id="raise-slider" min="${minRaise}" max="${maxRaise}" step="10" value="${initRaise}" oninput="updateRaiseLabel(this.value, ${maxRaise})" style="width:90%; margin-top:4px;">`;
                                }
                            } else {
                                html += `<button class="action-btn" onclick="playerAction('CHECK')">Check</button>`;
                                if (state.pot > 0) html += `<button class="action-btn" onclick="playerAction('FOLD')">Fold</button>`;
                                if (p.chips > 0) {
                                    let maxRaise = p.chips;
                                    let minRaise = Math.min(50, maxRaise);
                                    let initRaise = minRaise;
                                    html += `<button class="action-btn" id="raise-btn" onclick="playerAction('BET', parseInt(document.getElementById('raise-slider').value))">Bet $${initRaise}</button>`;
                                    html += `<input type="range" id="raise-slider" min="${minRaise}" max="${maxRaise}" step="10" value="${initRaise}" oninput="updateRaiseLabel(this.value, ${maxRaise})" style="width:90%; margin-top:4px;">`;
                                }
                            }
                            controlsEl.innerHTML = html;
                        } else {
                            controlsEl.innerHTML = '';
                        }
                    }
                }
            });
        }
    </script>
</body>

</html>
